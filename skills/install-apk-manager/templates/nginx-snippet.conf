# nginx snippet for apk-version-manager
# Insert into your existing `server { ... }` block, ideally right after
# your other /api/ or /health locations and BEFORE any catch-all /.

# APK distribution + auto-update.
# - GET /apks/manifest           → list versions (public, JSON)
# - GET /apks/:filename          → APK download (public, binary)
# - GET /apks/device/version     → device polling endpoint (public, JSON)
# - POST /apks/upload            → upload new APK (admin auth checked in backend)
# - DELETE /apks/:filename       → remove APK (admin auth checked in backend)
#
# CRITICAL settings:
#   client_max_body_size 100m  — APK uploads can be 30-100MB
#   proxy_buffering off        — APK downloads must stream, not be buffered into memory
location /apks/ {
    client_max_body_size 100m;
    proxy_pass http://127.0.0.1:8000/apks/;   # ← change 8000 to your backend port
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_buffering off;
    proxy_cache off;
}
